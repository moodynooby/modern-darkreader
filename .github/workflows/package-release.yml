name: Package & Release (One Click)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      node_version:
        description: 'Node.js version'
        required: true
        default: '22.x'

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} -m "chore: bump version to %s"
          echo "new_version=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Install dependencies
        run: npm ci

      - name: Build the extension
        run: npm run release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_version }}
          files: |
            build/release/darkreader-*
          generate_release_notes: true

      - name: Upload built artifact
        uses: actions/upload-artifact@v4
        with:
          path: build/release/darkreader-*
          retention-days: 90
